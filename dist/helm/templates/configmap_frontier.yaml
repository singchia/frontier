{{- if .Values.frontier.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontier.frontier.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "frontier.frontier.labels" . | nindent 4 }}
data:
  frontier.yaml: |
{{ tpl (.Files.Get "configs/frontier/frontier.yaml") . | indent 4 }}
{{- end }}
