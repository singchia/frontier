{{- if .Values.frontier.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontier.frontier.fullname" . }}-servicebound
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "frontier.frontier.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontier.service.servicebound.type }}
  ports:
    - name: servicebound
      port: {{ .Values.frontier.service.servicebound.port }}
      targetPort: servicebound
      protocol: TCP
  selector:
    {{- include "frontier.frontier.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontier.frontier.fullname" . }}-edgebound
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "frontier.frontier.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontier.service.edgebound.type }}
  ports:
    - name: edgebound
      port: {{ .Values.frontier.service.edgebound.port }}
      targetPort: edgebound
      {{- if eq .Values.frontier.service.edgebound.type "NodePort" }}
      nodePort: {{ .Values.frontier.service.edgebound.port }}
      {{- end }}
      protocol: TCP
  selector:
    {{- include "frontier.frontier.selectorLabels" . | nindent 4 }}
{{- if .Values.observability.frontier.enabled }}
---
# Headless service for /metrics scraping (paired with the ServiceMonitor).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontier.frontier.fullname" . }}-metrics
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "frontier.frontier.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: {{ .Values.observability.frontier.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "frontier.frontier.selectorLabels" . | nindent 4 }}
{{- end }}
{{- end }}
