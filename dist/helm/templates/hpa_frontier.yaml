{{- if and .Values.frontier.enabled .Values.frontier.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "frontier.frontier.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "frontier.frontier.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "frontier.frontier.fullname" . }}
  minReplicas: {{ .Values.frontier.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.frontier.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.frontier.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.frontier.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.frontier.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.frontier.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
