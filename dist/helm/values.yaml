# ============================================================================
# Frontier Helm chart — default values
# ----------------------------------------------------------------------------
# This chart deploys the data plane (frontier) + the control plane (frontlas)
# in one shot, with an optional bundled Redis subchart. Defaults mirror the
# operator's production-grade settings (see /docs/operator).
# ============================================================================

global:
  registry: singchia
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ----------------------------------------------------------------------------
# Frontier — data plane
# ----------------------------------------------------------------------------
frontier:
  enabled: true
  replicaCount: 1

  image:
    repository: frontier
    tag: ""               # defaults to .Chart.AppVersion
    pullPolicy: ""        # defaults to global.imagePullPolicy

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  podAnnotations: {}
  podLabels: {}

  # Production defaults: nonRoot uid 65532, dropped capabilities.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Long-lived edge connections need at least 60s grace; drain = grace - 10.
  terminationGracePeriodSeconds: 60
  drainSeconds: 50

  # preStop sleep gives kube-proxy time to remove the pod from Service
  # Endpoints before SIGTERM tears connections down.
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 10"]

  livenessProbe:
    tcpSocket:
      port: edgebound
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    tcpSocket:
      port: servicebound
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  resources: {}

  service:
    servicebound:
      type: ClusterIP
      port: 30011
    edgebound:
      type: NodePort
      port: 30012
    controlplane:
      type: ClusterIP
      port: 30010

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: frontier.example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  # Default: preferred host anti-affinity (rendered by template). Set this to
  # a non-empty Affinity object to fully replace the default.
  affinity: {}

  extraEnv: []

# ----------------------------------------------------------------------------
# Frontlas — control plane
# ----------------------------------------------------------------------------
frontlas:
  enabled: true
  replicaCount: 1

  image:
    repository: frontlas
    tag: ""               # defaults to .Chart.AppVersion
    pullPolicy: ""        # defaults to global.imagePullPolicy

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  terminationGracePeriodSeconds: 30

  livenessProbe:
    tcpSocket:
      port: controlplane
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /cluster/v1/health
      port: controlplane
    periodSeconds: 5

  resources: {}

  service:
    controlplane:
      type: ClusterIP
      port: 40011
    frontierplane:
      type: ClusterIP
      port: 40012

  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  affinity: {}

  extraEnv: []

  # When `redis.enabled: false`, point Frontlas at an existing Redis here.
  externalRedis:
    addrs: []                  # e.g. ["redis.svc.cluster.local:6379"]
    user: ""
    redisType: standalone      # standalone | sentinel | cluster
    masterName: ""
    db: 0
    passwordSecret:
      name: ""                 # leave empty for unauthenticated Redis
      key: password

# ----------------------------------------------------------------------------
# Observability — /healthz, /readyz, /metrics endpoints (since M3)
# ----------------------------------------------------------------------------
observability:
  frontier:
    enabled: true
    port: 9091
  frontlas:
    enabled: true
    port: 9092

# Prometheus Operator ServiceMonitor (off by default; turn on if you have
# prometheus-operator installed).
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# ----------------------------------------------------------------------------
# Redis — required by Frontlas for cluster metadata
# ----------------------------------------------------------------------------
# When enabled (default), the bitnami/redis subchart is installed and the
# chart wires Frontlas to it automatically. For an external Redis, set
# `redis.enabled: false` and configure `frontlas.externalRedis` above.
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    # Leave empty to let bitnami auto-generate. The chart reads it from
    # the `<release>-redis` Secret either way.
    password: ""
  master:
    persistence:
      enabled: true
      size: 8Gi
